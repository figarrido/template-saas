    { name = "pytest" },
    { name = "watchfiles" },
]

[package.metadata]
requires-dist = [
    { name = "opentelemetry-exporter-otlp", specifier = ">=1.27" },
    { name = "opentelemetry-sdk", specifier = ">=1.27" },
    { name = "psycopg", extras = ["binary"], specifier = ">=3.2" },
    { name = "pydantic", specifier = ">=2.7" },
    { name = "pydantic-settings", specifier = ">=2.4" },
    { name = "sentry-sdk", specifier = ">=2.18" },
    { name = "starlette", specifier = ">=0.41" },
    { name = "structlog", specifier = ">=24.1" },
    { name = "tembo-pgmq-python", specifier = ">=0.10" },
    { name = "uvicorn", specifier = ">=0.32" },
]

[package.metadata.requires-dev]
dev = [
    { name = "pytest", specifier = ">=8.3" },
    { name = "watchfiles", specifier = ">=0.24" },
]
