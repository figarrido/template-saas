name: PR title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

# Conventional Commits enforced on PR titles (not individual commits) —
# docs/architecture/08-platform.md § Conventional Commits / PR title rules.
# Squash-merge promotes the title into main, so this is the load-bearing check.

permissions:
  pull-requests: read

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            build
            ci
            revert
          requireScope: false
          subjectPattern: '^(?![A-Z]).+$'
          subjectPatternError: |
            PR title subject must start with a lowercase letter.
