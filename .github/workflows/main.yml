name: Main

on:
  push:
    branches: [main]
    tags: ['v*']

# Full gate on main/tags. docs/architecture/08-platform.md § CI specifics:
# Playwright E2E + RLS + prod builds run here, not per-PR, to avoid flake
# gating individual PRs.

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 22

jobs:
  full:
    runs-on: ubuntu-latest
    env:
      # `supabase start` validates the send_email auth hook against
      # env(SEND_EMAIL_HOOK_SECRET) before booting; `pnpm setup` supplies it
      # locally but CI never runs setup. Valid-format placeholder, not a real
      # secret — see ci.yml migration-validation for the rationale.
      SEND_EMAIL_HOOK_SECRET: 'v1,whsec_dGVtcGxhdGUtc2Fhcy1jaS1wbGFjZWhvbGRlci0zMmJh'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # See ci.yml — supabase CLI is a pinned workspace dev dep.
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec supabase start
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm env:example:check
      - run: pnpm db:types:check
      - run: pnpm db:introspect:check
      - run: pnpm -F @template/db test:rls
      - name: Export Supabase keys for integration tests
        run: |
          eval "$(pnpm exec supabase status -o env)"
          # Runtime suites (billing/admin) + the E2E admin app connect as the
          # scoped app_service role, as prod does; the auth suite needs the owner
          # (auth.users DML) via SUPABASE_DB_URL. Swap $DB_URL's userinfo for
          # app_service + its seed password.
          APP_DB_URL="${DB_URL/postgres:postgres@/app_service:postgres@}"
          echo "SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "SUPABASE_DB_URL=$DB_URL" >> $GITHUB_ENV
          echo "WORKER_DATABASE_URL=$APP_DB_URL" >> $GITHUB_ENV
          echo "ADMIN_DATABASE_URL=$APP_DB_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SITE_URL=http://localhost:3001" >> $GITHUB_ENV
      # The auth integration suite drives real GoTrue sign-up / email-change,
      # and GoTrue POSTs the confirmation mail to the send_email hook
      # (supabase/config.toml → host.docker.internal:3000/api/auth/hooks/send-email),
      # served by apps/web. Unlike ci.yml — which has no E2E and simply disables
      # the hook — this job's later Playwright step needs the hook live, so we
      # bring the endpoint up instead of toggling config: boot the web dev server
      # (mirrors `pnpm dev`, the setup these specs were written against), wait for
      # :3000, and warm the hook route so GoTrue's first call doesn't race a cold
      # compile. The env mirrors the E2E step's block so the app boots identically.
      - name: Start web app for the send_email hook
        env:
          SUPABASE_URL: 'http://127.0.0.1:54421'
          NEXT_PUBLIC_SUPABASE_URL: 'http://127.0.0.1:54421'
          SUPABASE_SERVICE_ROLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU'
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0'
          ADMIN_DATABASE_URL: 'postgresql://app_service:postgres@127.0.0.1:54422/postgres'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
          STRIPE_SECRET_KEY: 'sk_test_placeholder'
          STRIPE_WEBHOOK_SECRET: 'whsec_placeholder'
          MAIL_PROVIDER: 'smtp'
          SMTP_HOST: '127.0.0.1'
          SMTP_PORT: '54425'
        run: |
          pnpm -F @template/web dev > "$RUNNER_TEMP/web-dev.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/web.pid"
          # A signature-less POST returns 401 once the route is compiled; poll
          # until the endpoint answers (misses are fast connection-refused).
          for i in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
              -X POST http://localhost:3000/api/auth/hooks/send-email || true)
            if [ "$code" != "000" ]; then
              echo "send_email hook responding (HTTP $code) after ${i} attempt(s)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::apps/web did not come up on :3000 in time"
          cat "$RUNNER_TEMP/web-dev.log" || true
          exit 1
      - run: pnpm -F @template/auth test:integration
      - run: pnpm -F @template/billing test:integration
      - run: pnpm -F @template/admin test:integration
      # Free :3000 for the E2E Playwright webServer. `pnpm dev` spawns a child
      # `next` process that keeps the port bound after the wrapper PID is killed,
      # so kill by port (fuser) and confirm the socket is released before build.
      - name: Stop web app
        if: always()
        run: |
          kill "$(cat "$RUNNER_TEMP/web.pid")" 2>/dev/null || true
          for _ in $(seq 1 10); do
            fuser -k 3000/tcp 2>/dev/null || true
            fuser 3000/tcp >/dev/null 2>&1 || break
            sleep 1
          done
      - run: pnpm build
        env:
          # Supply local-dev Supabase defaults so apps/admin env validation
          # doesn't crash during Next.js page-data collection (the worker
          # Turbo spawns doesn't reliably receive undeclared env vars).
          # These are the same well-known defaults on every local install —
          # not production secrets.
          SUPABASE_URL: 'http://127.0.0.1:54421'
          NEXT_PUBLIC_SUPABASE_URL: 'http://127.0.0.1:54421'
          SUPABASE_SERVICE_ROLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU'
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0'
          ADMIN_DATABASE_URL: 'postgresql://app_service:postgres@127.0.0.1:54422/postgres'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3001'
          STRIPE_SECRET_KEY: 'sk_test_placeholder'
          STRIPE_WEBHOOK_SECRET: 'whsec_placeholder'
      - run: pnpm -F @template/web exec playwright install --with-deps chromium
      - run: pnpm -r --filter='./apps/*' test:e2e
        env:
          SUPABASE_URL: 'http://127.0.0.1:54421'
          NEXT_PUBLIC_SUPABASE_URL: 'http://127.0.0.1:54421'
          SUPABASE_SERVICE_ROLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU'
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0'
          ADMIN_DATABASE_URL: 'postgresql://app_service:postgres@127.0.0.1:54422/postgres'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
          STRIPE_SECRET_KEY: 'sk_test_placeholder'
          STRIPE_WEBHOOK_SECRET: 'whsec_placeholder'
          # The auth send_email hook renders + dispatches verification mail here
          # (the specs read it back from Mailpit). E2E runs a prod build
          # (`next start` → NODE_ENV=production), so `selectEmailProvider()`
          # would default to Resend and throw without RESEND_API_KEY. Pin it to
          # SMTP → the local Mailpit that `supabase start` exposes on :54425.
          MAIL_PROVIDER: 'smtp'
          SMTP_HOST: '127.0.0.1'
          SMTP_PORT: '54425'
