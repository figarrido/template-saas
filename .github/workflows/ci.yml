name: CI

on:
  pull_request:
    # spec/** branches are Sandcastle's per-spec integration branches: child
    # PRs target them, and the orchestrator merges only on a green fast gate.
    branches: [main, 'spec/**']

# Per-PR fast gate. docs/architecture/08-platform.md § CI specifics:
# "PR feedback under ~3 min for the inner loop; full suite on merge avoids
# E2E flake gating individual PRs." Playwright + RLS + prod builds run on
# main.yml.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  # Keep in sync with the `supabase` version in package.json.
  SUPABASE_VERSION: 2.109.1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install --frozen-lockfile
      # Excludes test:rls which needs the live Supabase stack; that runs in
      # the `migration-validation` job below and again on main.
      - run: pnpm -r --filter='!@template/db' --if-present run test

  env-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm env:example:check

  migration-validation:
    # Spins up a local Supabase stack, applies the PR's migrations, regenerates
    # types + Drizzle schema and fails if they drift. Also runs the RLS suite
    # so a buggy policy lands here, not in main. docs/architecture/02-data.md
    # § Testing names this as the "load-bearing safety net".
    runs-on: ubuntu-latest
    env:
      # `supabase start` validates the send_email hook's secret before booting
      # (config.toml reads env(SEND_EMAIL_HOOK_SECRET)). `pnpm setup` writes it
      # to supabase/.env locally, but CI never runs setup — so supply a
      # valid-format placeholder. Not a real secret.
      SEND_EMAIL_HOOK_SECRET: 'v1,whsec_dGVtcGxhdGUtc2Fhcy1jaS1wbGFjZWhvbGRlci0zMmJh'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_VERSION }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Disable the send_email hook for the test stack. It POSTs auth emails to
      # the Next hook at host.docker.internal:3000, which this job doesn't serve,
      # so GoTrue's signUp/changeEmail dispatch would fail. Disabled, GoTrue uses
      # its built-in templates → Mailpit — matching prod's "dispatch succeeds"
      # path. The hook's own logic is covered by packages/email unit tests, and
      # the auth integration suite mints tokens via the admin API, not real mail.
      - name: Disable send_email hook for the CI stack
        run: perl -0pi -e 's/(\[auth\.hook\.send_email\]\nenabled = )true/${1}false/' supabase/config.toml
      # Foreground start: blocks until every service is healthy and fails loudly
      # (with the container error in this step's log) if one can't come up. The
      # previous background-start + `until supabase status` poll raced — status
      # returns 0 once the DB is reachable, ahead of the API/Kong on :54421, so
      # the poll broke early and db:types:check hit a not-yet-ready API in CI.
      - run: supabase start
      - run: pnpm db:types:check
      - run: pnpm db:introspect:check
      - run: pnpm -F @template/db test:rls
      - name: Export Supabase keys for integration tests
        run: |
          eval "$(supabase status -o env)"
          # Runtime suites (billing/admin) connect as the scoped app_service role,
          # as apps/admin + services/* do in prod; the auth suite needs the owner
          # (it does auth.users DML) and reads SUPABASE_DB_URL. $DB_URL is the
          # owner connection; swap its userinfo for app_service + seed password.
          APP_DB_URL="${DB_URL/postgres:postgres@/app_service:postgres@}"
          echo "SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "SUPABASE_DB_URL=$DB_URL" >> $GITHUB_ENV
          echo "WORKER_DATABASE_URL=$APP_DB_URL" >> $GITHUB_ENV
          echo "ADMIN_DATABASE_URL=$APP_DB_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SITE_URL=http://localhost:3001" >> $GITHUB_ENV
      - run: pnpm -F @template/auth test:integration
      - run: pnpm -F @template/billing test:integration
      - run: pnpm -F @template/admin test:integration
