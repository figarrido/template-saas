name: CI

on:
  pull_request:
    branches: [main]

# Per-PR fast gate. docs/architecture/08-platform.md § CI specifics:
# "PR feedback under ~3 min for the inner loop; full suite on merge avoids
# E2E flake gating individual PRs." Playwright + RLS + prod builds run on
# main.yml.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  # Keep in sync with the `supabase` version in package.json.
  SUPABASE_VERSION: 2.107.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install --frozen-lockfile
      # Excludes test:rls which needs the live Supabase stack; that runs in
      # the `migration-validation` job below and again on main.
      - run: pnpm -r --filter='!@template/db' --if-present run test

  env-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm env:example:check

  migration-validation:
    # Spins up a local Supabase stack, applies the PR's migrations, regenerates
    # types + Drizzle schema and fails if they drift. Also runs the RLS suite
    # so a buggy policy lands here, not in main. docs/architecture/02-data.md
    # § Testing names this as the "load-bearing safety net".
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install the CLI globally before pnpm install so we can start Supabase
      # in the background and overlap image-pulling with the pnpm setup steps.
      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_VERSION }}
      - name: Start Supabase (background)
        run: nohup supabase start > /tmp/supabase-start.log 2>&1 &
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Wait for Supabase
        run: |
          timeout 420 bash -c 'until supabase status 2>/dev/null; do sleep 3; done'
      # Surface why `supabase start` never came up — the background process
      # logs here and is otherwise invisible when the wait above times out.
      - name: Supabase start log (on failure)
        if: failure()
        run: cat /tmp/supabase-start.log || echo '(no /tmp/supabase-start.log)'
      - run: pnpm db:types:check
      - run: pnpm db:introspect:check
      - run: pnpm -F @template/db test:rls
      - name: Export Supabase keys for integration tests
        run: |
          eval "$(supabase status -o env)"
          echo "SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "WORKER_DATABASE_URL=$DB_URL" >> $GITHUB_ENV
      - run: pnpm -F @template/auth test:integration
