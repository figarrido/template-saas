name: Audit

on:
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC
  workflow_dispatch: {}

# docs/architecture/08-platform.md § Dependency hygiene:
# "`pnpm audit` runs in CI on main weekly; high-severity findings open an
# issue automatically."

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9.15.4

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: audit
        run: |
          set +e
          pnpm audit --audit-level=high --json > audit.json
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ $status -ne 0 ]; then
            jq -r '.advisories | to_entries | map("- " + .value.module_name + " (" + .value.severity + "): " + .value.title + " — " + (.value.url // "")) | .[]' audit.json > findings.txt || true
          fi
      - if: steps.audit.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const findings = fs.existsSync('findings.txt') ? fs.readFileSync('findings.txt', 'utf8') : '(no findings.txt)';
            const title = `High-severity dependency advisory — ${new Date().toISOString().slice(0,10)}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Weekly \`pnpm audit\` reported high-severity advisories.\n\n${findings}\n\nWorkflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['security']
            });
