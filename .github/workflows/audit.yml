name: Audit

on:
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC
  workflow_dispatch: {}

# docs/architecture/08-platform.md § Dependency hygiene:
# "`pnpm audit` runs in CI on main weekly; high-severity findings are tracked
# on a single rolling issue (security + needs-triage), refreshed each run."

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: 22

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: audit
        run: |
          set +e
          pnpm audit --audit-level=high --json > audit.json
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ $status -ne 0 ]; then
            jq -r '.advisories | to_entries | map("- " + .value.module_name + " (" + .value.severity + "): " + .value.title + " — " + (.value.url // "")) | .[]' audit.json > findings.txt || true
          fi
      - if: steps.audit.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          # Maintain a single rolling issue rather than opening a new one each
          # run. We identify it by a hidden marker in the body (label-scoped
          # search), refresh its findings, and add a comment. A fresh issue is
          # only created when no open rolling issue exists.
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const marker = '<!-- pnpm-audit-report -->';
            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const findings = fs.existsSync('findings.txt')
              ? fs.readFileSync('findings.txt', 'utf8')
              : '(no findings.txt)';
            const body = [
              marker,
              `Weekly \`pnpm audit --audit-level=high\` reported high-severity advisories. Last updated **${today}**.`,
              '',
              findings,
              '',
              `Workflow: ${runUrl}`,
            ].join('\n');

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'security', per_page: 100,
            });
            const rolling = open.find((i) => !i.pull_request && (i.body || '').includes(marker));

            if (rolling) {
              await github.rest.issues.update({ owner, repo, issue_number: rolling.number, body });
              await github.rest.issues.createComment({
                owner, repo, issue_number: rolling.number,
                body: `Re-checked ${today}: high-severity advisories still present. Refreshed the list above.\n\nWorkflow: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: 'High-severity dependency advisories',
                body,
                labels: ['security', 'needs-triage'],
              });
            }
